name: Deploy Infra CDK

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  AWS_REGION: us-east-1

jobs:
  cdk-deploy:
    name: CDK Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_LC }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_LC }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        working-directory: infra
        run: npm ci

      - name: Build
        working-directory: infra
        run: npm run build

      - name: CDK Deploy
        working-directory: infra
        env:
          NODE_ENV: ${{ github.event.inputs.environment == 'production' && 'production' || '' }}
        run: npx cdk deploy --all --require-approval never
