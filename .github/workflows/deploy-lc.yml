name: Deploy to AWS (low-cost)

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: incidents-backend-lc
  ECS_CLUSTER: incidents-lc-cluster
  TASK_DEFINITION: IncidentsLcEcsStackIncidentsTaskDef4F14A4D9
  ECS_SUBNET: subnet-0f71fc74020a848f3
  ECS_SG: sg-0710b39300514a28b

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_LC }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_LC }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Run DB migrations
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition ${{ env.TASK_DEFINITION }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ env.ECS_SUBNET }}],securityGroups=[${{ env.ECS_SG }}],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"incidents-backend","command":["sh","-c","export DATABASE_URL=\"postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}\" && npx prisma migrate deploy"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN
          EXIT_CODE=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Migration exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || exit 1

      - name: Run DB seed
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition ${{ env.TASK_DEFINITION }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ env.ECS_SUBNET }}],securityGroups=[${{ env.ECS_SG }}],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"incidents-backend","command":["sh","-c","export DATABASE_URL=\"postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}\" && node dist/seed/seed.js"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          echo "Seed task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN
          EXIT_CODE=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Seed exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || exit 1

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service incidents-lc-service \
            --force-new-deployment \
            --query 'service.serviceName' \
            --output text

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          NEXT_PUBLIC_API_URL=/api/v1 npm run build

      - name: Deploy frontend
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name IncidentsLcFrontendStack \
            --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' \
            --output text)
          CF_ID=$(aws cloudformation describe-stacks \
            --stack-name IncidentsLcFrontendStack \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text)
          aws s3 sync frontend/out/ s3://$BUCKET --delete
          aws cloudfront create-invalidation \
            --distribution-id $CF_ID --paths "/*"
